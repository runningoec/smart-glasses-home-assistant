<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>HA Glasses</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/favicon-192x192.png">
  <style>
    /*
      MRBD display constraints:
        - 600x600 fixed viewport.
        - Additive waveguide: BLACK pixels are transparent. Design dark-on-bright contrast.
        - Min font: 16px body, 20-24px primary.
        - Keyboard-only input. v1 doesn't need any input, but Escape is still wired
          so future iterations can navigate.
    */
    :root {
      --bg: #000;
      --fg: #fff;
      --dim: #aab;
      --on: #6f6;
      --off: #555;
      --warn: #fc6;
      --stale: #fc6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    html, body {
      width: 600px; height: 600px; overflow: hidden;
      background: var(--bg); color: var(--fg);
      font: 20px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app { width: 600px; height: 600px; display: flex; flex-direction: column; }

    /* Pairing screen — first launch only. */
    #pair {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center;
    }
    #pair h1 { font-size: 36px; font-weight: 700; margin-bottom: 18px; }
    #pair .code {
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 80px; font-weight: 800; letter-spacing: 8px;
      margin: 12px 0 24px;
    }
    #pair p { font-size: 22px; color: var(--dim); }
    #pair .progress { margin-top: 32px; font-size: 18px; color: var(--dim); }

    /* Glance grid — after pairing. */
    #grid {
      flex: 1; display: grid; gap: 6px; padding: 12px;
      width: 600px; height: 600px;
    }
    /* Adaptive layout. Empty grid says we're showing the empty-state instead. */
    #grid[data-count="1"] { grid-template: 1fr / 1fr; }
    #grid[data-count="2"] { grid-template: 1fr / 1fr 1fr; }
    #grid[data-count="3"], #grid[data-count="4"] { grid-template: 1fr 1fr / 1fr 1fr; }
    #grid[data-count="5"], #grid[data-count="6"] { grid-template: 1fr 1fr / 1fr 1fr 1fr; }
    #grid[data-count="7"], #grid[data-count="8"] { grid-template: 1fr 1fr / 1fr 1fr 1fr 1fr; }

    .cell {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 14px;
      display: flex; flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      min-width: 0;
    }
    .cell .name {
      font-size: 18px; font-weight: 600; color: var(--dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cell .value {
      font-size: 36px; font-weight: 800; font-variant-numeric: tabular-nums;
      overflow: hidden; text-overflow: ellipsis;
    }
    /* When the grid is dense (5+) shrink the value to keep it readable. */
    #grid[data-count="5"] .cell .value, #grid[data-count="6"] .cell .value,
    #grid[data-count="7"] .cell .value, #grid[data-count="8"] .cell .value {
      font-size: 28px;
    }
    /* Single-cell mode gets a huge centered display. */
    #grid[data-count="1"] .cell { justify-content: center; text-align: center; padding: 48px; }
    #grid[data-count="1"] .cell .name { font-size: 28px; }
    #grid[data-count="1"] .cell .value { font-size: 96px; }

    .cell[data-on="true"]  .value { color: var(--on); }
    .cell[data-on="false"] .value { color: var(--off); }
    .cell[data-stale="true"] .value { color: var(--stale); }

    #empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center;
    }
    #empty h2 { font-size: 28px; margin-bottom: 12px; }
    #empty p { font-size: 18px; color: var(--dim); }

    #status {
      position: fixed; bottom: 6px; left: 0; right: 0;
      text-align: center; font-size: 14px; color: var(--dim);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main id="app">
    <section id="pair" hidden>
      <h1>Pair to Home Assistant</h1>
      <div class="code" id="pair-code">------</div>
      <p>In your phone browser open<br>
        <strong id="pair-host"></strong><strong>/smart-glasses</strong></p>
      <p>and approve this code.</p>
      <div class="progress" id="pair-progress">Waiting for approval…</div>
    </section>

    <section id="grid" hidden></section>

    <section id="empty" hidden>
      <h2>No entities configured</h2>
      <p>Open the panel at /smart-glasses<br>and pick up to 8.</p>
    </section>
  </main>
  <div id="status"></div>

  <script>
  (() => {
    "use strict";

    // ----- Constants ------------------------------------------------------
    const LS_TOKEN_KEY = "smartGlasses.token";
    const LS_SESSION_KEY = "smartGlasses.sessionId";
    const POLL_PAIR_MS = 2000;
    const RECONNECT_BASE_MS = 1500;
    const RECONNECT_MAX_MS = 20000;
    const STATES_REFRESH_MS = 60000;

    // ----- DOM refs -------------------------------------------------------
    const $pair = document.getElementById("pair");
    const $pairCode = document.getElementById("pair-code");
    const $pairHost = document.getElementById("pair-host");
    const $pairProgress = document.getElementById("pair-progress");
    const $grid = document.getElementById("grid");
    const $empty = document.getElementById("empty");
    const $status = document.getElementById("status");

    // ----- State ----------------------------------------------------------
    let token = localStorage.getItem(LS_TOKEN_KEY);
    let sessionId = localStorage.getItem(LS_SESSION_KEY);
    let selectedEntities = [];   // entity_ids the panel says to show
    let states = new Map();      // entity_id -> state object (live)
    let ws = null;
    let wsMsgId = 1;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let pairTimer = null;
    let nextStatesRefresh = null;

    // ----- Pairing flow ---------------------------------------------------

    async function ensurePaired() {
      if (token) return true;

      let pairing = null;
      if (sessionId) {
        // We have a session id from a prior load. Try to recover.
        try {
          const res = await fetch(`/api/smart_glasses/pair/${sessionId}/token`);
          if (res.ok) {
            const data = await res.json();
            token = data.token;
            localStorage.setItem(LS_TOKEN_KEY, token);
            return true;
          }
          if (res.status === 404) {
            sessionId = null;
            localStorage.removeItem(LS_SESSION_KEY);
          }
        } catch { /* fall through */ }
      }

      if (!sessionId) {
        const res = await fetch("/api/smart_glasses/pair/start", { method: "POST" });
        const data = await res.json();
        sessionId = data.session_id;
        localStorage.setItem(LS_SESSION_KEY, sessionId);
        pairing = data;
      }

      $pairCode.textContent = pairing?.code ?? "—";
      $pairHost.textContent = location.host;
      showPanel("pair");

      // Poll until token shows up.
      return new Promise((resolve) => {
        pairTimer = setInterval(async () => {
          try {
            const res = await fetch(`/api/smart_glasses/pair/${sessionId}/token`);
            if (res.status === 200) {
              const data = await res.json();
              token = data.token;
              localStorage.setItem(LS_TOKEN_KEY, token);
              clearInterval(pairTimer);
              resolve(true);
            } else if (res.status === 404) {
              // Server forgot us. Start over.
              clearInterval(pairTimer);
              sessionId = null;
              localStorage.removeItem(LS_SESSION_KEY);
              resolve(ensurePaired());
            } else {
              $pairProgress.textContent = `Waiting for approval…  (${new Date().toLocaleTimeString()})`;
            }
          } catch (err) {
            $pairProgress.textContent = `Network error: ${err.message}`;
          }
        }, POLL_PAIR_MS);
      });
    }

    // ----- HA REST + websocket -------------------------------------------

    async function fetchSelectedEntities() {
      const res = await fetch("/api/smart_glasses/entities", {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) {
        if (res.status === 401) {
          tokenInvalid();
          return [];
        }
        throw new Error(`entities ${res.status}`);
      }
      const data = await res.json();
      return data.entities ?? [];
    }

    async function fetchStatesFor(entityIds) {
      // HA REST: GET /api/states returns ALL states. For 1-8 ids we filter
      // client-side; cheap enough that fetching individually is overkill.
      const res = await fetch("/api/states", {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) {
        if (res.status === 401) tokenInvalid();
        throw new Error(`states ${res.status}`);
      }
      const all = await res.json();
      const wanted = new Set(entityIds);
      const m = new Map();
      for (const s of all) if (wanted.has(s.entity_id)) m.set(s.entity_id, s);
      return m;
    }

    function connectWebsocket() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${location.host}/api/websocket`);

      ws.addEventListener("open", () => {
        // HA's websocket protocol expects {type: 'auth', access_token: ...}
        // after the server sends auth_required. We just send our auth on
        // open; HA tolerates either order.
      });

      ws.addEventListener("message", (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }
        if (msg.type === "auth_required") {
          ws.send(JSON.stringify({ type: "auth", access_token: token }));
        } else if (msg.type === "auth_ok") {
          reconnectAttempts = 0;
          setStatus("Connected");
          // Subscribe to state_changed. We filter client-side because HA's
          // subscribe_events doesn't support an entity_id filter.
          ws.send(JSON.stringify({
            id: wsMsgId++,
            type: "subscribe_events",
            event_type: "state_changed",
          }));
        } else if (msg.type === "auth_invalid") {
          tokenInvalid();
        } else if (msg.type === "event") {
          const ev = msg.event;
          if (ev?.event_type !== "state_changed") return;
          const eid = ev.data?.entity_id;
          if (!eid || !selectedEntities.includes(eid)) return;
          if (ev.data.new_state) {
            states.set(eid, ev.data.new_state);
          } else {
            states.delete(eid);
          }
          renderGrid();
        }
      });

      ws.addEventListener("close", () => {
        setStatus("Reconnecting…");
        scheduleReconnect();
      });
      ws.addEventListener("error", () => {
        try { ws.close(); } catch { /* ignore */ }
      });
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      const delay = Math.min(
        RECONNECT_MAX_MS,
        RECONNECT_BASE_MS * 2 ** Math.min(6, reconnectAttempts++),
      );
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        startGlance().catch((err) => {
          setStatus(`Reconnect failed: ${err.message}`);
          scheduleReconnect();
        });
      }, delay);
    }

    function tokenInvalid() {
      // Drop credentials and re-pair.
      localStorage.removeItem(LS_TOKEN_KEY);
      localStorage.removeItem(LS_SESSION_KEY);
      token = null;
      sessionId = null;
      try { ws?.close(); } catch { /* ignore */ }
      ws = null;
      bootstrap();
    }

    // ----- Render --------------------------------------------------------

    function showPanel(name) {
      $pair.hidden = name !== "pair";
      $grid.hidden = name !== "grid";
      $empty.hidden = name !== "empty";
    }

    const DOOR_LIKE = new Set(["door", "garage_door", "window", "opening"]);

    function fmtState(s) {
      const v = s.state;
      const dom = s.entity_id.split(".")[0];
      const dc = s.attributes?.device_class;
      if (v === "unavailable" || v === "unknown") return "—";
      if (dom === "binary_sensor" && DOOR_LIKE.has(dc)) return v === "on" ? "OPEN" : "CLOSED";
      if (dom === "cover") return v.toUpperCase();
      if (v === "on" || v === "off") return v.toUpperCase();
      const unit = s.attributes?.unit_of_measurement;
      return unit ? `${v} ${unit}` : v;
    }

    function renderGrid() {
      if (selectedEntities.length === 0) {
        showPanel("empty");
        return;
      }
      $grid.dataset.count = String(selectedEntities.length);
      $grid.innerHTML = selectedEntities.map((eid) => {
        const s = states.get(eid);
        const name = s?.attributes?.friendly_name || eid;
        const stale = !s || s.state === "unavailable" || s.state === "unknown";
        const onAttr = s?.state === "on" || s?.state === "open" ? "true"
                    : s?.state === "off" || s?.state === "closed" ? "false"
                    : "unset";
        return `
          <div class="cell" data-on="${onAttr}" data-stale="${stale}">
            <div class="name">${name}</div>
            <div class="value">${s ? fmtState(s) : "—"}</div>
          </div>
        `;
      }).join("");
      showPanel("grid");
    }

    function setStatus(txt) {
      $status.textContent = txt || "";
    }

    // ----- Bootstrap ------------------------------------------------------

    async function startGlance() {
      selectedEntities = await fetchSelectedEntities();
      states = await fetchStatesFor(selectedEntities);
      renderGrid();
      connectWebsocket();

      // Defensive: HA websocket usually keeps us current but we resync the
      // selected-entity LIST every minute in case the panel changed it.
      clearInterval(nextStatesRefresh);
      nextStatesRefresh = setInterval(async () => {
        try {
          const fresh = await fetchSelectedEntities();
          if (fresh.join(",") !== selectedEntities.join(",")) {
            selectedEntities = fresh;
            states = await fetchStatesFor(selectedEntities);
            renderGrid();
          }
        } catch (err) {
          setStatus(`Refresh failed: ${err.message}`);
        }
      }, STATES_REFRESH_MS);
    }

    async function bootstrap() {
      try {
        await ensurePaired();
        await startGlance();
      } catch (err) {
        setStatus(`Error: ${err.message}`);
        console.error(err);
      }
    }

    // Allow Escape to clear credentials (useful for testing/re-pairing).
    document.addEventListener("keydown", (evt) => {
      if (evt.key === "Escape" && evt.shiftKey) {
        // Shift+Escape: hard reset. (Plain Escape is reserved for future
        // navigation actions per the keyboard-only input model.)
        tokenInvalid();
        evt.preventDefault();
      }
    });

    bootstrap();
  })();
  </script>
</body>
</html>
