<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>HA Glasses</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/smart_glasses_static/favicon-192x192.png">
  <style>
    /*
      MRBD display constraints:
        - 600x600 fixed viewport.
        - Additive waveguide: BLACK pixels are transparent. Design dark-on-bright contrast.
        - Min font: 16px body, 20-24px primary.
        - Keyboard-only input. v1 doesn't need any input, but Escape is still wired
          so future iterations can navigate.
    */
    :root {
      --bg: #000;
      --fg: #fff;
      --dim: #aab;
      --on: #6f6;
      --off: #555;
      --warn: #fc6;
      --stale: #fc6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    html, body {
      width: 600px; height: 600px; overflow: hidden;
      background: var(--bg); color: var(--fg);
      font: 20px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app { width: 600px; height: 600px; display: flex; flex-direction: column; }

    /* Tab strip across the top:
         ┌────────────────────────────────────────────┐
         │  Kitchen     Living Room     Bedroom       │   ← prev / current / next
         │            • • ● • • • • •                 │   ← position dots
         └────────────────────────────────────────────┘
       The active card name is bright; the prev/next previews are dim
       ghost text so the user can see what they'll get if they swipe.
       Only renders prev/next slots when there are >1 cards. */
    #tabs {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; padding: 8px 10px 0;
      flex-shrink: 0;
    }
    #tabs[data-focus-mode="tabs"] .tab-name {
      border-color: var(--fg);
    }
    .tab-row {
      display: flex; align-items: baseline; justify-content: center;
      gap: 12px; width: 100%; max-width: 100%;
    }
    .tab-name {
      font-size: 22px; font-weight: 700;
      max-width: 100%;
      padding: 4px 14px;
      border-radius: 8px;
      border: 2px solid transparent;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-align: center;
      flex: 0 1 auto;
      cursor: pointer;
    }
    .tab-side {
      font-size: 14px; font-weight: 500;
      color: rgba(255, 255, 255, 0.28);
      flex: 1 1 0; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      cursor: pointer;
    }
    .tab-side.tab-prev { text-align: right; }
    .tab-side.tab-next { text-align: left; }
    .tab-dots {
      display: flex; gap: 6px; align-items: center;
      padding: 2px 0;
    }
    .tab-dots .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
    }
    .tab-dots .dot.active {
      background: var(--fg);
      width: 8px; height: 8px;
    }

    /* Pairing screen — first launch only. */
    #pair {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center;
    }
    #pair h1 { font-size: 36px; font-weight: 700; margin-bottom: 18px; }
    #pair .code {
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 80px; font-weight: 800; letter-spacing: 8px;
      margin: 12px 0 24px;
    }
    #pair p { font-size: 22px; color: var(--dim); }
    #pair .progress { margin-top: 32px; font-size: 18px; color: var(--dim); }

    /* Glance grid — after pairing. Width is fixed (600px viewport) but
       height is whatever's left after the tab strip. */
    #grid {
      flex: 1; display: grid; gap: 6px; padding: 10px;
      width: 600px; min-height: 0;
    }
    /* Adaptive layout. Empty grid says we're showing the empty-state instead. */
    #grid[data-count="1"] { grid-template: 1fr / 1fr; }
    #grid[data-count="2"] { grid-template: 1fr / 1fr 1fr; }
    #grid[data-count="3"], #grid[data-count="4"] { grid-template: 1fr 1fr / 1fr 1fr; }
    #grid[data-count="5"], #grid[data-count="6"] { grid-template: 1fr 1fr / 1fr 1fr 1fr; }
    #grid[data-count="7"], #grid[data-count="8"] { grid-template: 1fr 1fr / 1fr 1fr 1fr 1fr; }

    .cell {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 10px 12px;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 6px;
      text-align: center;
      overflow: hidden;
      min-width: 0;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
    }
    .cell:active {
      background: rgba(255,255,255,0.15);
      transform: scale(0.98);
    }
    /* Value is the headline — large, bold, the one thing you read at a glance. */
    .cell .value {
      font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums;
      line-height: 1.05;
      max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    /* Name is the subtitle — smaller, dimmer, two lines max so it can
       wrap (e.g. "Living Room Fan Lights" doesn't truncate to "Living
       Room Fan ...") without exploding the cell. */
    .cell .name {
      font-size: 15px; font-weight: 500; color: var(--dim);
      line-height: 1.2;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* When the grid is dense (5+) shrink the headline so it doesn't
       blow past the available width. */
    #grid[data-count="5"] .cell .value, #grid[data-count="6"] .cell .value,
    #grid[data-count="7"] .cell .value, #grid[data-count="8"] .cell .value {
      font-size: 28px;
    }
    #grid[data-count="5"] .cell .name, #grid[data-count="6"] .cell .name,
    #grid[data-count="7"] .cell .name, #grid[data-count="8"] .cell .name {
      font-size: 13px;
    }
    /* Single-cell mode goes really big. */
    #grid[data-count="1"] .cell { padding: 48px; gap: 16px; }
    #grid[data-count="1"] .cell .value { font-size: 96px; }
    #grid[data-count="1"] .cell .name  { font-size: 28px; -webkit-line-clamp: 3; }

    .cell[data-on="true"]  .value { color: var(--on); }
    .cell[data-on="false"] .value { color: var(--off); }
    .cell[data-stale="true"] .value { color: var(--stale); }
    /* Bright outline on the focused cell while focusMode === "cells". */
    .cell.focused { border-color: var(--fg); background: rgba(255,255,255,0.12); }
    /* Armed: tapped once on a "confirm: true" item — waits for second tap. */
    .cell.armed {
      border-color: var(--warn);
      background: rgba(252, 204, 102, 0.10);
    }
    .cell.armed::after {
      content: "TAP AGAIN TO CONFIRM";
      position: absolute; left: 0; right: 0; bottom: 4px;
      text-align: center; font-size: 12px; font-weight: 700;
      color: var(--warn); letter-spacing: 1px;
    }
    .cell { position: relative; }

    #empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; text-align: center;
    }
    #empty h2 { font-size: 28px; margin-bottom: 12px; }
    #empty p { font-size: 18px; color: var(--dim); }

    #status {
      position: fixed; bottom: 6px; left: 0; right: 0;
      text-align: center; font-size: 14px; color: var(--dim);
      pointer-events: none;
      display: none !important;
    }
  </style>
</head>
<body>
  <main id="app">
    <section id="pair" hidden>
      <h1>Pair to Home Assistant</h1>
      <div class="code" id="pair-code">------</div>
      <p>In your phone browser open<br>
        <strong id="pair-host"></strong><strong>/smart-glasses</strong></p>
      <p>and approve this code.</p>
      <div class="progress" id="pair-progress">Waiting for approval…</div>
    </section>

    <section id="tabs" hidden></section>
    <section id="grid" hidden></section>

    <section id="empty" hidden>
      <h2>No entities configured</h2>
      <p>Open the panel at /smart-glasses<br>and pick up to 8.</p>
    </section>
  </main>
  <div id="status"></div>

  <script>
  (() => {
    "use strict";

    // ----- Constants ------------------------------------------------------
    const LS_TOKEN_KEY = "smartGlasses.token";
    const LS_SESSION_KEY = "smartGlasses.sessionId";

    // HTML-escape any HA-supplied string before interpolating into innerHTML.
    // Defensive: requires HA admin to inject a hostile entity name in the
    // first place, but no reason to leave it open.
    const esc = (s) => String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
    const POLL_PAIR_MS = 2000;
    const RECONNECT_BASE_MS = 1500;
    const RECONNECT_MAX_MS = 20000;
    const RECONNECT_MAX_ATTEMPTS = 20;
    const STATES_REFRESH_MS = 60000;

    // ----- DOM refs -------------------------------------------------------
    const $pair = document.getElementById("pair");
    const $pairCode = document.getElementById("pair-code");
    const $pairHost = document.getElementById("pair-host");
    const $pairProgress = document.getElementById("pair-progress");
    const $tabs = document.getElementById("tabs");
    const $grid = document.getElementById("grid");
    const $empty = document.getElementById("empty");
    const $status = document.getElementById("status");

    // ----- State ----------------------------------------------------------
    // Defensive: an older version of this app could write the literal
    // string "undefined" into localStorage if the auth handshake misfired.
    // Scrub those before anything else touches them.
    const cleanLS = (k) => {
      const v = localStorage.getItem(k);
      if (v === null || v === "undefined" || v === "null" || v === "") {
        localStorage.removeItem(k);
        return null;
      }
      return v;
    };
    let token = cleanLS(LS_TOKEN_KEY);
    let sessionId = cleanLS(LS_SESSION_KEY);
    let cards = [];              // configured cards
    let currentCardIndex = 0;
    // Two-mode keyboard navigation:
    //   "tabs"  — Left/Right cycles cards, Down/Enter dives into items.
    //   "cells" — Up/Down/Left/Right walks items, Enter triggers, Esc goes
    //             back to tabs.
    let focusMode = "tabs";
    let focusedCellIndex = 0;
    // Two-step confirm state: when a "confirm" item is fired the first time,
    // we arm it and wait for a second invocation within ARM_WINDOW_MS.
    // Navigation, timeout, or any non-arming action clears it.
    const ARM_WINDOW_MS = 5000;
    let armed = null;            // { cardIdx, cellIdx, until }
    let armedTimer = null;
    let states = new Map();      // entity_id -> state object (live)
    let ws = null;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let pairTimer = null;
    let nextStatesRefresh = null;

    // ----- Pairing flow ---------------------------------------------------

    async function ensurePaired() {
      if (token) return true;

      // Try to recover an in-flight pairing first. A stale session_id from
      // localStorage might still be live on the server (still pending), or
      // it might be 404/410'd — in which case we start fresh.
      let pendingPairing = null; // {session_id, code}

      if (sessionId) {
        try {
          const res = await fetch(`/api/smart_glasses/pair/${sessionId}/token`);
          if (res.status === 200) {
            const data = await res.json();
            if (data.token) {
              token = data.token;
              localStorage.setItem(LS_TOKEN_KEY, token);
              return true;
            }
          } else if (res.status === 202) {
            const data = await res.json();
            pendingPairing = { session_id: sessionId, code: data.code };
          } else if (res.status === 404 || res.status === 410) {
            // Server doesn't know us, or token was already collected.
            // Either way, our local state is dead — re-pair fresh.
            sessionId = null;
            localStorage.removeItem(LS_SESSION_KEY);
          }
        } catch { /* fall through to create */ }
      }

      // Either we never had a session, or it's gone — request a new one.
      if (!pendingPairing) {
        const res = await fetch("/api/smart_glasses/pair/start", { method: "POST" });
        if (res.status === 429) {
          // Rate-limited. Show a clear message and back off.
          $pairCode.textContent = "—";
          $pairHost.textContent = location.host;
          $pairProgress.textContent = "Too many pairing attempts. Wait a minute, then refresh.";
          showPanel("pair");
          throw new Error("rate-limited");
        }
        if (!res.ok) {
          $pairProgress.textContent = `Pair start failed (${res.status})`;
          throw new Error(`pair_start ${res.status}`);
        }
        const data = await res.json();
        if (!data.session_id || !data.code) {
          throw new Error("pair_start: missing session_id/code");
        }
        sessionId = data.session_id;
        localStorage.setItem(LS_SESSION_KEY, sessionId);
        pendingPairing = data;
      }

      $pairCode.textContent = pendingPairing.code;
      $pairHost.textContent = location.host;
      $pairProgress.textContent = "Waiting for approval…";
      showPanel("pair");

      // Poll until the admin approves the code on the panel.
      return new Promise((resolve, reject) => {
        pairTimer = setInterval(async () => {
          try {
            const res = await fetch(`/api/smart_glasses/pair/${sessionId}/token`);
            if (res.status === 200) {
              const data = await res.json();
              if (!data.token) {
                throw new Error("approved response missing token");
              }
              token = data.token;
              localStorage.setItem(LS_TOKEN_KEY, token);
              clearInterval(pairTimer);
              resolve(true);
            } else if (res.status === 404 || res.status === 410) {
              // Lost our spot. Start completely over.
              clearInterval(pairTimer);
              sessionId = null;
              localStorage.removeItem(LS_SESSION_KEY);
              resolve(ensurePaired());
            } else if (res.status === 202) {
              $pairProgress.textContent = `Waiting for approval…  (${new Date().toLocaleTimeString()})`;
            } else {
              $pairProgress.textContent = `Server returned ${res.status}`;
            }
          } catch (err) {
            $pairProgress.textContent = `Network error: ${err.message}`;
          }
        }, POLL_PAIR_MS);
      });
    }

    // ----- Smart Glasses proxy API ---------------------------------------
    // Glasses-side calls never hit HA's native /api/* anymore. The token's
    // scope is limited to what the proxy endpoints expose (cards + entities
    // on cards + services that match an action on a card).

    async function fetchCards() {
      const res = await fetch("/api/smart_glasses/glance/cards", {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) {
        if (res.status === 401) { tokenInvalid(); return []; }
        throw new Error(`cards ${res.status}`);
      }
      const data = await res.json();
      return data.cards ?? [];
    }

    async function fetchStates() {
      // Server already filters to entities on cards — no client-side
      // filtering needed.
      const res = await fetch("/api/smart_glasses/glance/states", {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) {
        if (res.status === 401) { tokenInvalid(); return new Map(); }
        throw new Error(`states ${res.status}`);
      }
      const all = await res.json();
      const m = new Map();
      for (const s of all) m.set(s.entity_id, s);
      return m;
    }

    async function callService(domain, service, targetEid) {
      const body = { domain, service };
      if (targetEid) body.target = { entity_id: targetEid };
      const res = await fetch("/api/smart_glasses/glance/call_service", {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "content-type": "application/json",
        },
        body: JSON.stringify(body),
      });
      if (res.status === 401) { tokenInvalid(); return; }
      if (res.status === 403) {
        setStatus("Action not allowed");
        return;
      }
      if (!res.ok) {
        setStatus(`call_service ${res.status}`);
      }
    }

    function connectWebsocket() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${location.host}/api/smart_glasses/glance/ws`);

      ws.addEventListener("open", () => {
        // Our protocol: first message is auth. Server replies auth_ok or
        // auth_invalid, then streams filtered state_changed events.
        ws.send(JSON.stringify({ type: "auth", access_token: token }));
      });

      ws.addEventListener("message", (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }
        if (msg.type === "auth_ok") {
          reconnectAttempts = 0;
          setStatus("Connected");
        } else if (msg.type === "auth_invalid") {
          tokenInvalid();
        } else if (msg.type === "state_changed") {
          if (!msg.entity_id) return;
          if (msg.new_state) {
            states.set(msg.entity_id, msg.new_state);
          } else {
            states.delete(msg.entity_id);
          }
          renderGrid();
        }
      });

      ws.addEventListener("close", () => {
        if (!ws) return; // Intentionally closed
        setStatus("Reconnecting…");
        scheduleReconnect();
      });
      ws.addEventListener("error", () => {
        try { ws.close(); } catch { /* ignore */ }
      });
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      if (reconnectAttempts >= RECONNECT_MAX_ATTEMPTS) {
        // Give up. Don't loop the network forever — if the server has
        // genuinely gone away the user can re-launch the Web App on the
        // glasses (or back-gesture out and back in) to start a fresh
        // attempt. We show a clear message so they know that's what to do.
        setStatus("Disconnected. Re-launch the app to retry.");
        return;
      }
      const delay = Math.min(
        RECONNECT_MAX_MS,
        RECONNECT_BASE_MS * 2 ** Math.min(6, reconnectAttempts++),
      );
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        startGlance().catch((err) => {
          setStatus(`Reconnect failed: ${err.message}`);
          scheduleReconnect();
        });
      }, delay);
    }

    function tokenInvalid() {
      // Drop credentials and re-pair.
      localStorage.removeItem(LS_TOKEN_KEY);
      localStorage.removeItem(LS_SESSION_KEY);
      token = null;
      sessionId = null;
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      if (ws) {
        const oldWs = ws;
        ws = null;
        try { oldWs.close(); } catch { /* ignore */ }
      }
      bootstrap();
    }

    // ----- Render --------------------------------------------------------

    function showPanel(name) {
      $pair.hidden = name !== "pair";
      $tabs.hidden = name !== "grid";
      $grid.hidden = name !== "grid";
      $empty.hidden = name !== "empty";
    }

    const DOOR_LIKE = new Set(["door", "garage_door", "window", "opening"]);

    // Round a numeric state to a sensible number of decimals.
    // HA sets ``suggested_display_precision`` on most sensors and uses it
    // for its own UI; reuse it so the glasses match what HA shows
    // elsewhere. Falls back to a magnitude-based heuristic for template
    // sensors that don't declare a precision explicitly.
    function formatNumeric(raw, attrs) {
      const n = Number(raw);
      if (!Number.isFinite(n)) return raw;
      const declared = attrs?.suggested_display_precision;
      if (Number.isInteger(declared) && declared >= 0) {
        return n.toFixed(declared);
      }
      // Integer values stay integers ("78" not "78.0").
      if (Number.isInteger(n)) return String(n);
      const abs = Math.abs(n);
      const decimals = abs >= 100 ? 0 : abs >= 10 ? 1 : abs >= 1 ? 2 : 3;
      return n.toFixed(decimals);
    }

    function fmtState(s) {
      const v = s.state;
      const dom = s.entity_id.split(".")[0];
      const dc = s.attributes?.device_class;

      // Light-group fallback: HA reports "unknown" when any member is
      // unreachable, even if the rest are clearly on. The server attaches
      // a _smart_glasses block with a derived state computed from
      // reachable members (ties go to ON, what most people mean by
      // "the room is on"). Use it when HA's own state is unhelpful.
      const sg = s._smart_glasses;
      if (sg?.is_group && sg.derived_state &&
          (v === "unknown" || v === "unavailable" || v === "none" || v == null)) {
        const verb = sg.derived_state.toUpperCase();
        const reachable = sg.on + sg.off;
        return reachable < sg.members ? `${verb} ${sg.on}/${sg.members}` : verb;
      }

      if (v === "unavailable" || v === "unknown" || v === "none" || v == null) return "—";

      // Stateless / fire-and-forget entities: the .state field is either a
      // timestamp (scene) or unhelpful (button). Show the action verb so
      // the user knows what tapping does, not when it last did it.
      if (dom === "scene") return "ACTIVATE";
      if (dom === "button" || dom === "input_button") return "PRESS";
      if (dom === "script") return v === "on" ? "RUNNING" : "RUN";

      if (dom === "binary_sensor" && DOOR_LIKE.has(dc)) return v === "on" ? "OPEN" : "CLOSED";
      if (dom === "cover") return v.toUpperCase();
      // Group entities (legacy group.* and Light Group helpers via light.*)
      // report on/off normally — caught by the next branch.
      if (v === "on" || v === "off") return v.toUpperCase();
      const unit = s.attributes?.unit_of_measurement;
      const display = formatNumeric(v, s.attributes);
      return unit ? `${display} ${unit}` : display;
    }

    // Map an entity's domain to the natural service+verb its tap should
    // fire. Anything not listed falls through to homeassistant.toggle,
    // which covers light/switch/input_boolean/fan/climate/etc.
    function defaultServiceFor(entity_id) {
      const dom = entity_id.split(".")[0];
      switch (dom) {
        case "scene":        return ["scene", "turn_on"];
        case "script":       return ["script", "turn_on"];
        case "button":       return ["button", "press"];
        case "input_button": return ["input_button", "press"];
        case "automation":   return ["automation", "trigger"];
        case "cover":        return ["cover", "toggle"];
        default:             return ["homeassistant", "toggle"];
      }
    }

    function renderTabs() {
      if (cards.length === 0) {
        $tabs.innerHTML = "";
        return;
      }
      $tabs.dataset.focusMode = focusMode;
      const total = cards.length;
      const idx = currentCardIndex;
      const name = cards[idx]?.name ?? "";
      // Wrap-around previews so the user sees what swipe-left and
      // swipe-right will yield. Skip them entirely when there's only
      // one card to avoid showing "Office  Office  Office".
      const prev = total > 1 ? cards[(idx - 1 + total) % total].name : null;
      const next = total > 1 ? cards[(idx + 1) % total].name : null;
      const dots = cards.map((_, i) =>
        `<span class="dot${i === idx ? " active" : ""}"></span>`
      ).join("");
      $tabs.innerHTML = `
        <div class="tab-row">
          ${prev !== null ? `<div class="tab-side tab-prev" data-action="tab-prev">${esc(prev)}</div>` : `<div class="tab-side"></div>`}
          <div class="tab-name" data-action="tab-strip">${esc(name)}</div>
          ${next !== null ? `<div class="tab-side tab-next" data-action="tab-next">${esc(next)}</div>` : `<div class="tab-side"></div>`}
        </div>
        <div class="tab-dots">${dots}</div>
      `;
    }

    function renderGrid() {
      if (cards.length === 0 || !cards[currentCardIndex] || !cards[currentCardIndex].items || cards[currentCardIndex].items.length === 0) {
        renderTabs();
        showPanel("empty");
        return;
      }
      // Clamp focusedCellIndex so it stays valid as cards / items change.
      const card = cards[currentCardIndex];
      const items = card.items;
      if (focusedCellIndex >= items.length) focusedCellIndex = items.length - 1;
      if (focusedCellIndex < 0) focusedCellIndex = 0;

      renderTabs();

      $grid.dataset.count = String(items.length);
      const armedIdx = (armed && armed.cardIdx === currentCardIndex) ? armed.cellIdx : -1;
      $grid.innerHTML = items.map((item, idx) => {
        const focused = (focusMode === "cells" && idx === focusedCellIndex) ? " focused" : "";
        const armedCls = (idx === armedIdx) ? " armed" : "";
        if (item.type === "action") {
          // Action items: the verb (ACT) is the headline; the friendly
          // name describes what it does, below it.
          return `
            <div class="cell${focused}${armedCls}" data-idx="${idx}" data-type="action" data-on="unset" data-stale="false">
              <div class="value">ACT</div>
              <div class="name">${esc(item.name)}</div>
            </div>
          `;
        } else {
          const eid = item.entity_id;
          const s = states.get(eid);
          const name = s?.attributes?.friendly_name || eid;
          // Effective state for color + stale flag: the server-derived
          // group state when available, otherwise HA's reported state.
          const derived = s?._smart_glasses?.derived_state;
          const effective = derived ?? s?.state;
          const stale = !s || (
            (s.state === "unavailable" || s.state === "unknown") && !derived
          );
          const onAttr = effective === "on" || effective === "open" ? "true"
                      : effective === "off" || effective === "closed" ? "false"
                      : "unset";
          return `
            <div class="cell${focused}${armedCls}" data-idx="${idx}" data-type="entity" data-eid="${esc(eid)}" data-on="${onAttr}" data-stale="${stale}">
              <div class="value">${s ? esc(fmtState(s)) : "—"}</div>
              <div class="name">${esc(name)}</div>
            </div>
          `;
        }
      }).join("");
      showPanel("grid");
    }

    // How many columns the grid CSS lays out for a given item count. Keep
    // this in lock-step with #grid[data-count="..."] in <style> — Up/Down
    // jump by this many to feel like real grid navigation.
    function gridCols(n) {
      if (n <= 1) return 1;
      if (n <= 2) return 2;
      if (n <= 4) return 2;
      if (n <= 6) return 3;
      return 4; // 7-8
    }

    // Common helpers for nav.
    function switchCard(delta) {
      if (cards.length === 0) return;
      // Moving cards drops any in-flight arm. Wouldn't make sense to keep
      // it pointed at a cell the user can't see anymore.
      if (armed) clearArmed();
      currentCardIndex = (currentCardIndex + delta + cards.length) % cards.length;
      focusedCellIndex = 0;
      renderGrid();
    }

    function triggerFocusedCell() {
      if (focusMode !== "cells" || cards.length === 0) return;
      const items = cards[currentCardIndex]?.items ?? [];
      const item = items[focusedCellIndex];
      if (!item) return;
      fireItem(item, focusedCellIndex);
    }

    // Decide whether tapping an item right now requires a confirm step.
    // - true            → always
    // - {after,before}  → only when the current local time falls inside
    //                     the window (after≤now≤before, wrapping at midnight)
    // - missing/false   → never
    function shouldConfirm(item) {
      const c = item?.confirm;
      if (c === true) return true;
      if (!c || typeof c !== "object") return false;
      const now = new Date();
      const minutes = now.getHours() * 60 + now.getMinutes();
      const toMin = (s) => {
        const m = /^([01]\d|2[0-3]):([0-5]\d)$/.exec(s ?? "");
        return m ? Number(m[1]) * 60 + Number(m[2]) : null;
      };
      const after = toMin(c.after);
      const before = toMin(c.before);
      if (after === null && before === null) return false;
      if (after !== null && before !== null) {
        // Same-day window: after ≤ now ≤ before, or wrap-around (e.g. 22:00..07:00)
        return after <= before
          ? (minutes >= after && minutes <= before)
          : (minutes >= after || minutes <= before);
      }
      if (after  !== null) return minutes >= after;
      return minutes <= before;
    }

    function clearArmed() {
      if (armedTimer) { clearTimeout(armedTimer); armedTimer = null; }
      armed = null;
    }

    function fireItem(item, cellIdx) {
      // Confirm gate: two taps within ARM_WINDOW_MS. The first tap arms
      // (and shows "TAP AGAIN TO CONFIRM" on the cell); the second tap
      // within the window actually fires. Anything else (navigating away,
      // timeout) clears the arm.
      if (shouldConfirm(item)) {
        const now = Date.now();
        const sameCell = armed
          && armed.cardIdx === currentCardIndex
          && armed.cellIdx === cellIdx
          && now < armed.until;
        if (!sameCell) {
          armed = { cardIdx: currentCardIndex, cellIdx, until: now + ARM_WINDOW_MS };
          if (armedTimer) clearTimeout(armedTimer);
          armedTimer = setTimeout(() => { clearArmed(); renderGrid(); }, ARM_WINDOW_MS + 50);
          renderGrid();
          return;
        }
        // Confirmed — fall through to actually fire.
        clearArmed();
      }
      if (item.type === "action") {
        const parts = item.action.split(".");
        if (parts.length !== 2) return;
        callService(parts[0], parts[1], item.target ?? null);
      } else if (item.entity_id) {
        const [d, s] = defaultServiceFor(item.entity_id);
        callService(d, s, item.entity_id);
      }
    }

    function setStatus(txt) {
      $status.textContent = txt || "";
    }

    // Pointer interactions work as a direct fast-path: click a tab to
    // switch cards, click a cell to fire it. This is independent of the
    // keyboard focus model — useful when previewing in a browser, and
    // harmless on glasses (no pointer events fire there).
    $tabs.addEventListener("click", (evt) => {
      if (cards.length === 0) return;
      // Prev/next ghost text is tappable as a shortcut — equivalent to
      // swipe-left / swipe-right but without needing the gesture.
      const target = evt.target.closest("[data-action]");
      const action = target?.dataset?.action;
      if (action === "tab-prev") { switchCard(-1); return; }
      if (action === "tab-next") { switchCard( 1); return; }
      // Tapping the active card name drops into cells mode (mirrors the
      // swipe-down gesture and Down/Enter in tabs mode).
      const items = cards[currentCardIndex]?.items ?? [];
      if (items.length > 0) {
        focusMode = "cells";
        focusedCellIndex = 0;
        renderGrid();
      }
    });
    $grid.addEventListener("click", (evt) => {
      const cell = evt.target.closest(".cell");
      if (!cell || cards.length === 0) return;
      const idx = Number(cell.dataset.idx);
      const item = cards[currentCardIndex]?.items?.[idx];
      if (!item) return;
      // Move focus to the tapped cell, then fire it. fireItem handles the
      // confirm gate — tapping a "confirm: true" cell once arms it, a
      // second tap inside the window fires.
      focusMode = "cells";
      focusedCellIndex = idx;
      renderGrid();
      fireItem(item, idx);
    });

    // ----- Bootstrap ------------------------------------------------------

    async function startGlance() {
      cards = await fetchCards();
      states = await fetchStates();
      renderGrid();
      connectWebsocket();

      // The websocket keeps states live, but the CARD list itself isn't
      // pushed — admin edits in the panel only show up if we poll. Every
      // minute is plenty for a glance dashboard.
      clearInterval(nextStatesRefresh);
      nextStatesRefresh = setInterval(async () => {
        try {
          const freshCards = await fetchCards();
          if (JSON.stringify(freshCards) !== JSON.stringify(cards)) {
            cards = freshCards;
            if (currentCardIndex >= cards.length) currentCardIndex = 0;
            states = await fetchStates();
            renderGrid();
          }
        } catch (err) {
          setStatus(`Refresh failed: ${err.message}`);
        }
      }, STATES_REFRESH_MS);
    }

    async function bootstrap() {
      try {
        await ensurePaired();
        await startGlance();
      } catch (err) {
        setStatus(`Error: ${err.message}`);
        console.error(err);
      }
    }

    // ----- Keyboard nav (Neural Band + browser preview) ------------------
    //
    //   tabs mode:   ←/→ change card  ·  ↓ or Enter enter cells  ·
    //                Shift+Esc force re-pair
    //   cells mode:  ↑/↓ walk items   ·  ←/→ walk items, then wrap
    //                across cards at the row edge                ·
    //                Enter trigger item · Esc back to tabs · Shift+Esc re-pair
    document.addEventListener("keydown", (evt) => {
      if (evt.key === "Escape" && evt.shiftKey) {
        tokenInvalid();
        evt.preventDefault();
        return;
      }
      if (cards.length === 0) return;

      if (focusMode === "tabs") {
        if (evt.key === "ArrowLeft")       { switchCard(-1); evt.preventDefault(); }
        else if (evt.key === "ArrowRight") { switchCard( 1); evt.preventDefault(); }
        else if (evt.key === "ArrowDown" || evt.key === "Enter") {
          const items = cards[currentCardIndex]?.items ?? [];
          if (items.length > 0) {
            focusMode = "cells";
            focusedCellIndex = 0;
            renderGrid();
          }
          evt.preventDefault();
        }
        return;
      }

      // cells mode
      const items = cards[currentCardIndex]?.items ?? [];
      if (items.length === 0) {
        focusMode = "tabs";
        renderGrid();
        return;
      }
      // Any key in cells mode other than Enter cancels an in-flight arm
      // (so navigating away or pressing Esc drops the "tap again to
      // confirm" state). Enter handles arm/fire on its own below.
      if (evt.key !== "Enter" && armed) clearArmed();
      const cols = gridCols(items.length);
      const row = Math.floor(focusedCellIndex / cols);
      const col = focusedCellIndex % cols;

      if (evt.key === "Escape") {
        focusMode = "tabs";
        renderGrid();
        evt.preventDefault();
      } else if (evt.key === "ArrowUp") {
        if (row === 0) {
          // Already at the top row — bounce back to the tab strip.
          focusMode = "tabs";
        } else {
          focusedCellIndex = Math.max(0, focusedCellIndex - cols);
        }
        renderGrid();
        evt.preventDefault();
      } else if (evt.key === "ArrowDown") {
        // Move one row down; clamp to the last item if the grid is ragged
        // (e.g. 3 items in a 2-column grid means the bottom row has 1 item).
        focusedCellIndex = Math.min(items.length - 1, focusedCellIndex + cols);
        renderGrid();
        evt.preventDefault();
      } else if (evt.key === "ArrowLeft") {
        // Walking left off the row edge should feel like swiping the tab
        // strip: keep moving, but on the previous card.
        if (col > 0) {
          focusedCellIndex--;
          renderGrid();
        } else {
          switchCard(-1);
        }
        evt.preventDefault();
      } else if (evt.key === "ArrowRight") {
        // Same handoff on the right edge, including ragged last rows where
        // the next visual slot does not exist.
        if (col < cols - 1 && focusedCellIndex + 1 < items.length) {
          focusedCellIndex++;
          renderGrid();
        } else {
          switchCard(1);
        }
        evt.preventDefault();
      } else if (evt.key === "Enter") {
        triggerFocusedCell();
        evt.preventDefault();
      }
    });

    // ----- Touch swipes (browser preview / future touch hardware) --------
    // Horizontal swipe changes cards (mirrors Left/Right keys).
    // Vertical swipe enters / exits cells mode.
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener("touchstart", (e) => {
      if (!e.changedTouches.length) return;
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    });
    document.addEventListener("touchend", (e) => {
      if (!e.changedTouches.length || cards.length === 0) return;
      const dx = e.changedTouches[0].screenX - touchStartX;
      const dy = e.changedTouches[0].screenY - touchStartY;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      const THRESHOLD = 50;
      if (adx < THRESHOLD && ady < THRESHOLD) return;
      if (adx > ady) {
        // Horizontal — switch cards.
        switchCard(dx < 0 ? 1 : -1);
      } else if (dy > 0) {
        // Swipe down — enter cells mode if at tabs.
        if (focusMode === "tabs") {
          const items = cards[currentCardIndex]?.items ?? [];
          if (items.length > 0) {
            focusMode = "cells";
            focusedCellIndex = 0;
            renderGrid();
          }
        }
      } else {
        // Swipe up — back to tabs.
        if (focusMode === "cells") {
          focusMode = "tabs";
          renderGrid();
        }
      }
    });

    bootstrap();
  })();
  </script>
</body>
</html>
