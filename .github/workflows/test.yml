name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        # pytest-homeassistant-custom-component pulls in HA itself + its
        # dependency closure. Installing it cleanly resolves the full set;
        # ad-hoc piecemeal installs tend to mismatch.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
          pip install tzdata
      - name: Run tests
        run: pytest -q
